<!-- 🎧 DJ & TEMA SİSTEMİ (Alt satırlı Boss meta ve Sheet default BG destekli) -->
<script>
document.addEventListener('DOMContentLoaded', function () {

  // --- AYARLAR ---
  const defaultBackgrounds = [
    'https://iili.io/qCxKolf.jpg', 'https://iili.io/qCxKnKG.jpg',    
    'https://iili.io/qCxKqVn.jpg', 'https://iili.io/qCxKfoX.jpg',   
    'https://iili.io/qCxKBPs.jpg', 'https://iili.io/qCxKxS4.jpg',          
    'https://iili.io/K2FNDI2.jpg'
  ];
  
  const slideInterval = 30000; 
  const sheetUpdateInterval = 20000; 
  const statsUpdateInterval = 600000; // 10 Dakika
  
  const bgSheetURL = 'https://opensheet.elk.sh/1RNYtECHKnZB3w2ok7oClRwdCFM3JBRoyh3LNguaopzo/Sheet1';
  // Yeni verdiğin güncel URL eklendi
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwTk_EmlGKmi5eeXvw8AIFxiDjv9eQQKibEZ2Z9iUALy2_xmzzdi8mGW9fPfO99gZzPVg/exec';

  let djBackgrounds = {};
  let lastDJBaseName = ""; 
  let lastFullDJ = "";     
  let currentSlideIndex = 0;
  let slideTimer = null;
  let statsTimer = null;

  // --- 1. DJ LİSTESİ YÜKLEME ---
  async function loadDJList() {
    try {
      const response = await fetch(bgSheetURL);
      const data = await response.json();
      const newBackgrounds = {};
      data.forEach(row => {
        if (row.dj && row.bg) {
          newBackgrounds[row.dj.toUpperCase().trim()] = row.bg.trim();
        }
      });
      djBackgrounds = newBackgrounds;
    } catch (err) { console.error("Liste hatası:", err); }
  }

  // --- 2. İSTATİSTİK KAYIT SİSTEMİ ---
  async function reportDJStatus(djName, action, isFinish = false) {
    const baseName = djName.replace(/[0-9]/g, '').trim();
    const sessionKey = 'sent_start_' + baseName;
    
    // Eğer bu oturumda bu DJ için zaten start gönderilmişse tekrar gönderme
    if (action === "start" && sessionStorage.getItem(sessionKey)) {
        return; 
    }

    try {
      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          dj: baseName,
          action: action,
          finish: isFinish
        })
      });

      if (action === "start") {
          sessionStorage.setItem(sessionKey, 'true');
      }
      if (isFinish) {
          sessionStorage.removeItem(sessionKey);
      }
    } catch (e) { console.error("Kayıt hatası:", e); }
  }

  // --- 3. GÖRSEL YÖNETİM ---
  function updateBackground(url) {
    const container = document.getElementById('iframe-container');
    if (container) {
      container.style.backgroundImage = `url('${url}')`;
      container.style.transition = "background-image 1.2s ease-in-out"; 
    }
  }

  function startSlideshow() {
    if (slideTimer) return;
    updateBackground(defaultBackgrounds[currentSlideIndex]);
    slideTimer = setInterval(() => {
      currentSlideIndex = (currentSlideIndex + 1) % defaultBackgrounds.length;
      updateBackground(defaultBackgrounds[currentSlideIndex]);
    }, slideInterval);
  }

  function stopSlideshow() {
    clearInterval(slideTimer);
    slideTimer = null;
  }

  // --- 4. ANA KONTROL MEKANİZMASI ---
  function checkCurrentDJ() {
    const el = document.querySelector('.cc_streaminfo');
    if (!el) return;

    const currentMetadata = el.textContent.toUpperCase().trim();
    let foundFullDJ = null;

    for (const djCode in djBackgrounds) {
      if (currentMetadata.includes(djCode)) {
        foundFullDJ = djCode;
        break;
      }
    }

    if (foundFullDJ) {
      const currentBaseName = foundFullDJ.replace(/[0-9]/g, '').trim();

      // DURUM A: Aynı DJ, farklı tema (GUNGOR01 -> GUNGOR02)
      if (lastDJBaseName === currentBaseName && lastFullDJ !== foundFullDJ) {
        lastFullDJ = foundFullDJ;
        updateBackground(djBackgrounds[foundFullDJ]);
        return; 
      }

      // DURUM B: DJ Değişimi veya İlk Başlangıç
      if (lastDJBaseName !== currentBaseName) {
        // Eğer eski bir DJ varsa onun kaydını "finish" yaparak kapat
        if (lastDJBaseName && lastDJBaseName !== "OTO") {
          reportDJStatus(lastDJBaseName, "update", true);
          clearInterval(statsTimer);
        }

        stopSlideshow();
        lastDJBaseName = currentBaseName;
        lastFullDJ = foundFullDJ;
        updateBackground(djBackgrounds[foundFullDJ]);
        
        // Yeni DJ için başlat
        reportDJStatus(currentBaseName, "start");

        // Periyodik güncelleme başlat (10 dakikada bir)
        statsTimer = setInterval(() => {
          reportDJStatus(currentBaseName, "update", false);
        }, statsUpdateInterval);
      }
    } else {
      // OTO DJ MODU
      if (lastDJBaseName !== "OTO") {
        if (lastDJBaseName && lastDJBaseName !== "OTO") {
          reportDJStatus(lastDJBaseName, "update", true);
          clearInterval(statsTimer);
        }
        
        lastDJBaseName = "OTO";
        lastFullDJ = "";
        startSlideshow();
      }
    }
  }

  // --- BAŞLATICI ---
  const s = document.createElement('script');
  s.src = 'https://eu4.fastcast4u.com/system/streaminfo.js';
  s.onload = async () => {
    await loadDJList();
    checkCurrentDJ(); // İlk kontrol
    setInterval(loadDJList, sheetUpdateInterval); 
    setInterval(checkCurrentDJ, 5000); 
  };
  document.body.appendChild(s);

});
</script>

<script>
let lastEkipFingerprint = "";

async function loadSonsuzEkip() {
    try {
        const sheetId = '14kFHv5QFi9ZL5EQetTMuVMuwJXochAncBih1ce2croA';
        const url = `https://opensheet.elk.sh/${sheetId}/DJ_Bilgi`;
        
        const response = await fetch(url);
        let data = await response.json();
        
        const track = document.getElementById('ozel-ekip-track');
        if (!data || data.length === 0) return;

        const rutbeSiralamasi = { "KURUCU": 1, "ADMIN": 2, "TEKNIK EKIP": 3, "YAYINCI": 4, "MODERATOR": 5 };
        data.sort((a, b) => {
            let rA = (a.rutbe_adi || "").toUpperCase();
            let rB = (b.rutbe_adi || "").toUpperCase();
            return (rutbeSiralamasi[rA] || 99) - (rutbeSiralamasi[rB] || 99);
        });

        const currentFingerprint = JSON.stringify(data);
        if (currentFingerprint === lastEkipFingerprint) return;
        lastEkipFingerprint = currentFingerprint;

        function createEkipCard(item) {
            let ad = item.dj_adi || "İsimsiz";
            let foto = item.foto_url || 'https://iili.io/qvnCpee.jpg';
            let rutbe = item.rutbe_adi || "Ekip Üyesi";
            let isimRengi = item.isim_rengi || "#ffffff"; 
            let rutbeRengi = item.rutbe_rengi || "#cccccc"; 

            return 
                <div class="ekip-kart" style="--kişi-renk: ${isimRengi}; --neon-renk: ${isimRengi}44;">
                    <div class="foto-box">
                        <div class="donen-kenar"></div>
                        <img src="${foto}" class="ekip-profil-img" onerror="this.src='https://iili.io/qvnCpee.jpg'">
                    </div>
                    <div class="ekip-detay">
                        <span class="ekip-isim" style="color: ${isimRengi};">${ad}</span>
                        <span class="ekip-rutbe-etiket" style="color: ${rutbeRengi};">${rutbe}</span>
                    </div>
                </div>`;
        }

        const cardHtml = data.map(item => createEkipCard(item)).join("");
        track.innerHTML = cardHtml + cardHtml + cardHtml; // Kesintisiz döngü

    } catch (e) { console.error("Ekip paneli yüklenemedi:", e); }
}

loadSonsuzEkip();
setInterval(loadSonsuzEkip, 60000);
</script>

<script>

(function djInfoSystem() {
    const djImg = document.getElementById('dj-card-img');
    const djName = document.getElementById('dj-card-name');
    const djPrefix = document.getElementById('dj-prefix');
    const djRutbe = document.getElementById('dj-rutbe');
    const songName = document.getElementById('song-name');
    const djCard = document.getElementById('dj-status-card');
    const userCount = document.getElementById('users');

    const sheetId = '14kFHv5QFi9ZL5EQetTMuVMuwJXochAncBih1ce2croA';
    const sheetURL = `https://opensheet.elk.sh/${sheetId}/DJ_Bilgi`;

    function normalizeText(text) {
        return String(text || "").trim().toLowerCase()
            .replace(/ı/g, 'i').replace(/ş/g, 's').replace(/ğ/g, 'g')
            .replace(/ç/g, 'c').replace(/ö/g, 'o').replace(/ü/g, 'u');
    }

    async function updateDJStatus() {
        try {
            const response = await fetch(sheetURL);
            const djData = await response.json();
            const streamEl = document.querySelector('.cc_streaminfo');
            if (!streamEl) return;
            
            const rawInfo = streamEl.textContent.trim();
            const cleanRawInfo = normalizeText(rawInfo); 
            let activeDJ = null;

            djData.forEach(item => {
                if (item.dj_adi) {
                    const djNick = normalizeText(item.dj_adi);
                    const regex = new RegExp(djNick + "[0-9]+", "i"); 
                    if (regex.test(cleanRawInfo)) { activeDJ = item; }
                }
            });

            if (activeDJ) {
                djPrefix.innerText = "Yayında :";
                djName.innerText = activeDJ.dj_adi;
                const temaRengi = activeDJ.isim_rengi || '#00ffcc';
                djCard.style.setProperty('--dj-tema-rengi', temaRengi);
                djRutbe.innerText = activeDJ.rutbe_adi || "YAYINCI";
                djRutbe.style.background = activeDJ.rutbe_rengi || temaRengi;
                djImg.src = (activeDJ.foto_url && activeDJ.foto_url.trim().length > 10) ? activeDJ.foto_url.trim() : 'https://iili.io/qvnCpee.jpg';
                djImg.style.borderColor = temaRengi;
                let contentOnly = rawInfo.replace(/Unknown/gi, '').replace(/[a-zA-ZçöşğüıİÇÖŞĞÜ]+[0-9]+/g, '').replace(/^[\s-磨:]+/, '').trim();
                songName.innerText = (contentOnly.length > 3) ? contentOnly : `${activeDJ.dj_adi} ile Müzik Keyfi...`;
            } else {
                djName.innerText = "Auto Yayın";
                djPrefix.innerText = "Şuan Yayında :";
                let autoSong = rawInfo.replace(/Unknown/gi, '').replace(/^[\s-磨:]+/, '').trim();
                songName.innerText = autoSong || "Keyifli Dinlemeler...";
                djCard.style.setProperty('--dj-tema-rengi', "#00ff00");
                djImg.src = 'https://i.imgur.com/UKUVBN3.jpeg';
                djImg.style.borderColor = "#00ff00";
            }

            const listenerRes = await fetch('https://chameleon.chattersnet.nl/api/usercount.php?channel=Ufacikfmm');
            userCount.innerText = await listenerRes.text() || "0";
        } catch (err) { console.error("Hata:", err); }
    }
    setInterval(updateDJStatus, 5000); updateDJStatus();
})();

(function audioEngine() {
    const audio = document.getElementById('rAudio');
    const pBtn = document.getElementById('pBtn');
    const vInp = document.getElementById('vInp');
    const djCard = document.getElementById('dj-status-card');

    const chatOverlay = document.getElementById('chat-overlay');

    if (chatOverlay) {
        chatOverlay.addEventListener('mousedown', () => {
            if (audio.paused) {
                init();
                audio.play().then(() => {
                    pBtn.innerText = "⏸";
                    chatOverlay.style.display = 'none'; 
                }).catch(e => console.log("Play error"));
            } else {
                chatOverlay.style.display = 'none';
            }
        });
    }

    const canvas = document.getElementById('bgVisualizer');
    const ctx = canvas.getContext('2d');
    let aCtx, analyser, source, data;

    function createExtBars() {
        ['ext-left', 'ext-right'].forEach(id => {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 150; i++) {
                let bar = document.createElement('div');
                bar.className = 'ext-bar';
                container.appendChild(bar);
            }
        });
    }
    createExtBars();

    function init() {
        if (aCtx) {
            if (aCtx.state === 'suspended') aCtx.resume();
            return;
        }
        try {
            aCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = aCtx.createAnalyser();
            source = aCtx.createMediaElementSource(audio);
            source.connect(analyser);
            analyser.connect(aCtx.destination);
            analyser.fftSize = 64;
            data = new Uint8Array(analyser.frequencyBinCount);
            canvas.width = 420; canvas.height = 165;
            render();
        } catch(e) { console.log("Audio Init Error"); }
    }

    window.addEventListener('mousedown', (e) => {
        const yasakliEtiketler = ['INPUT', 'BUTTON', 'TEXTAREA', 'SELECT', 'A'];
        if (!yasakliEtiketler.includes(e.target.tagName) && audio.paused) {
            init();
            audio.play().then(() => pBtn.innerText = "⏸").catch(e => console.log("Play error"));
        }
    }, true);

    pBtn.addEventListener('click', (e) => {
        e.stopPropagation(); 
        init();
        if (audio.paused) {
            audio.play().then(() => pBtn.innerText = "⏸").catch(e => console.log("Play error"));
        } else {
            audio.pause();
            pBtn.innerText = "▶";
        }
    });
    
    vInp.addEventListener('input', (e) => audio.volume = e.target.value);

    function render() {
        requestAnimationFrame(render);
        if(!analyser) return;
        analyser.getByteFrequencyData(data);
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const djTemaRengi = getComputedStyle(djCard).getPropertyValue('--dj-tema-rengi').trim();
        
        let x = 0;
        for (let i = 0; i < data.length; i++) {
            let h = (data[i] / 255) * canvas.height;
            ctx.fillStyle = djTemaRengi + "33"; 
            ctx.fillRect(x, canvas.height - h, 15, h);
            x += 18;
        }

        if(audio.paused) {
             document.querySelectorAll('.ext-bar').forEach(b => b.classList.remove('active'));
             return;
        }

        const sum = data.reduce((a, b) => a + b, 0);
        const avg = sum / data.length;
        const currentLevel = Math.floor((avg / 140) * 150); 

        const allEqualizers = document.querySelectorAll('.ext-equalizer');
        allEqualizers.forEach(eq => {
            const bars = eq.getElementsByClassName('ext-bar');
            for (let i = 0; i < bars.length; i++) {
                if (i < currentLevel) {
                    bars[i].classList.add('active');
                } else {
                    bars[i].classList.remove('active');
                }
            }
        });
    }
})();
</script>
