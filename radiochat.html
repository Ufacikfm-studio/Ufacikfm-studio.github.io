<script>
document.addEventListener('DOMContentLoaded', function () {

  // --- AYARLAR ---
  const defaultBackgrounds = [
    'https://iili.io/qCxKolf.jpg', 'https://iili.io/qCxKnKG.jpg',    
    'https://iili.io/qCxKqVn.jpg', 'https://iili.io/qCxKfoX.jpg',   
    'https://iili.io/qCxKBPs.jpg', 'https://iili.io/qCxKxS4.jpg',          
    'https://iili.io/K2FNDI2.jpg'
  ];
  
  const slideInterval = 30000; 
  const sheetUpdateInterval = 20000; 
  const statsUpdateInterval = 600000; // 10 Dakika
  
  const bgSheetURL = 'https://opensheet.elk.sh/1RNYtECHKnZB3w2ok7oClRwdCFM3JBRoyh3LNguaopzo/Sheet1';
  // Yeni verdiğin güncel URL eklendi
  const scriptURL = 'https://script.google.com/macros/s/AKfycbwTk_EmlGKmi5eeXvw8AIFxiDjv9eQQKibEZ2Z9iUALy2_xmzzdi8mGW9fPfO99gZzPVg/exec';

  let djBackgrounds = {};
  let lastDJBaseName = ""; 
  let lastFullDJ = "";     
  let currentSlideIndex = 0;
  let slideTimer = null;
  let statsTimer = null;

  // --- 1. DJ LİSTESİ YÜKLEME ---
  async function loadDJList() {
    try {
      const response = await fetch(bgSheetURL);
      const data = await response.json();
      const newBackgrounds = {};
      data.forEach(row => {
        if (row.dj && row.bg) {
          newBackgrounds[row.dj.toUpperCase().trim()] = row.bg.trim();
        }
      });
      djBackgrounds = newBackgrounds;
    } catch (err) { console.error("Liste hatası:", err); }
  }

  // --- 2. İSTATİSTİK KAYIT SİSTEMİ ---
  async function reportDJStatus(djName, action, isFinish = false) {
    const baseName = djName.replace(/[0-9]/g, '').trim();
    const sessionKey = 'sent_start_' + baseName;
    
    // Eğer bu oturumda bu DJ için zaten start gönderilmişse tekrar gönderme
    if (action === "start" && sessionStorage.getItem(sessionKey)) {
        return; 
    }

    try {
      fetch(scriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          dj: baseName,
          action: action,
          finish: isFinish
        })
      });

      if (action === "start") {
          sessionStorage.setItem(sessionKey, 'true');
      }
      if (isFinish) {
          sessionStorage.removeItem(sessionKey);
      }
    } catch (e) { console.error("Kayıt hatası:", e); }
  }

  // --- 3. GÖRSEL YÖNETİM ---
  function updateBackground(url) {
    const container = document.getElementById('iframe-container');
    if (container) {
      container.style.backgroundImage = `url('${url}')`;
      container.style.transition = "background-image 1.2s ease-in-out"; 
    }
  }

  function startSlideshow() {
    if (slideTimer) return;
    updateBackground(defaultBackgrounds[currentSlideIndex]);
    slideTimer = setInterval(() => {
      currentSlideIndex = (currentSlideIndex + 1) % defaultBackgrounds.length;
      updateBackground(defaultBackgrounds[currentSlideIndex]);
    }, slideInterval);
  }

  function stopSlideshow() {
    clearInterval(slideTimer);
    slideTimer = null;
  }

<script>
(function(){
  const liste = document.getElementById('kayanListe');
  const beklemeSuresi = 5000;
  const kaymaSuresi   = 600;

  function satirYuksekligi() {
    const ilk = liste.children[0];
    return ilk ? ilk.getBoundingClientRect().height : 0;
  }

  const toplam = liste.children.length;
  if (toplam === 0) return;
  liste.appendChild(liste.children[0].cloneNode(true));

  let i = 0;
  let h = satirYuksekligi();

  window.addEventListener('resize', () => {
    h = satirYuksekligi();
    liste.style.transition = 'none';
    liste.style.transform = `translateY(${-i * h}px)`;
  });

  function sonraki() {
    i++;
    liste.style.transition = `transform ${kaymaSuresi}ms ease`;
    liste.style.transform = `translateY(${-i * h}px)`;

    if (i === toplam) {
      liste.addEventListener('transitionend', function geriSar() {
        liste.removeEventListener('transitionend', geriSar);
        liste.style.transition = 'none';
        i = 0;
        liste.style.transform = 'translateY(0)';
      }, { once: true });
    }
  }
  setInterval(sonraki, beklemeSuresi);
})();
</script>

<script>
let lastEkipFingerprint = "";

async function loadSonsuzEkip() {
    try {
        const sheetId = '14kFHv5QFi9ZL5EQetTMuVMuwJXochAncBih1ce2croA';
        const url = `https://opensheet.elk.sh/${sheetId}/DJ_Bilgi`;
        
        const response = await fetch(url);
        let data = await response.json();
        
        const track = document.getElementById('ozel-ekip-track');
        if (!data || data.length === 0) return;

        const rutbeSiralamasi = { "KURUCU": 1, "ADMIN": 2, "TEKNIK EKIP": 3, "YAYINCI": 4, "MODERATOR": 5 };
        data.sort((a, b) => {
            let rA = (a.rutbe_adi || "").toUpperCase();
            let rB = (b.rutbe_adi || "").toUpperCase();
            return (rutbeSiralamasi[rA] || 99) - (rutbeSiralamasi[rB] || 99);
        });

        const currentFingerprint = JSON.stringify(data);
        if (currentFingerprint === lastEkipFingerprint) return;
        lastEkipFingerprint = currentFingerprint;

        function createEkipCard(item) {
            let ad = item.dj_adi || "İsimsiz";
            let foto = item.foto_url || 'https://iili.io/qvnCpee.jpg';
            let rutbe = item.rutbe_adi || "Ekip Üyesi";
            let isimRengi = item.isim_rengi || "#ffffff"; 
            let rutbeRengi = item.rutbe_rengi || "#cccccc"; 

            return 
                <div class="ekip-kart" style="--kişi-renk: ${isimRengi}; --neon-renk: ${isimRengi}44;">
                    <div class="foto-box">
                        <div class="donen-kenar"></div>
                        <img src="${foto}" class="ekip-profil-img" onerror="this.src='https://iili.io/qvnCpee.jpg'">
                    </div>
                    <div class="ekip-detay">
                        <span class="ekip-isim" style="color: ${isimRengi};">${ad}</span>
                        <span class="ekip-rutbe-etiket" style="color: ${rutbeRengi};">${rutbe}</span>
                    </div>
                </div>`;
        }

        const cardHtml = data.map(item => createEkipCard(item)).join("");
        track.innerHTML = cardHtml + cardHtml + cardHtml; // Kesintisiz döngü

    } catch (e) { console.error("Ekip paneli yüklenemedi:", e); }
}

loadSonsuzEkip();
setInterval(loadSonsuzEkip, 60000);
</script>
